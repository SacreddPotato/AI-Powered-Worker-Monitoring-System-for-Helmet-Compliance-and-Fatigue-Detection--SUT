name: Regression Tests

on:
  push:
  pull_request:

jobs:
  backend-api:
    name: backend-api
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0 libegl1

      - name: Set up Conda fatigue_env
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: fatigue_env
          python-version: "3.10"
          auto-activate-base: false

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install Python dependencies
        shell: bash -l {0}
        run: |
          conda activate fatigue_env
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run backend API regression suite
        shell: bash -l {0}
        run: |
          conda activate fatigue_env
          python -m pytest -m "not ml" -q

  model-snapshot:
    name: model-snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0 libegl1

      - name: Set up Conda fatigue_env
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: fatigue_env
          python-version: "3.10"
          auto-activate-base: false

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Cache model downloads
        uses: actions/cache@v4
        with:
          path: backend/ml_models
          key: ml-models-${{ runner.os }}-${{ hashFiles('backend/ml_models/model_snapshot.json') }}

      - name: Install Python dependencies
        shell: bash -l {0}
        run: |
          conda activate fatigue_env
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Verify model snapshot
        shell: bash -l {0}
        run: |
          conda activate fatigue_env
          python scripts/snapshot_models.py verify

      - name: Run real ML regression suite
        shell: bash -l {0}
        run: |
          conda activate fatigue_env
          python -m pytest -m ml -q

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend route and API tests
        working-directory: frontend
        run: npm test -- --run

      - name: Build frontend
        working-directory: frontend
        run: npm run build
